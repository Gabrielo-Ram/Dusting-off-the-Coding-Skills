<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Only in Pictures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #ede8d0;
        --ink: #2a2118;
        --ink-light: #5a4e42;
        --accent: #c4a882;
      }

      html,
      body {
        background: var(--cream);
        color: var(--ink);
        font-family: "Lora", Georgia, serif;
        min-height: 100vh;
        cursor: pointer;
      }

      /* ── Title screen ── */
      #title-screen {
        position: fixed;
        inset: 0;
        background: var(--cream);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        z-index: 100;
        transition:
          opacity 1s ease,
          visibility 1s ease;
      }

      #title-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #title-screen h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.4rem, 8vw, 5rem);
        font-weight: 600;
        font-style: italic;
        letter-spacing: 0.02em;
        color: var(--ink);
        text-align: center;
        padding: 0 1rem;
      }

      #title-screen .date {
        font-family: "Lora", serif;
        font-size: 1.2rem;
        color: var(--ink-light);
        letter-spacing: 0.08em;
      }

      #title-screen .hint {
        font-family: "Lora", serif;
        font-size: 0.85rem;
        color: var(--ink-light);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        animation: pulse 2.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      /* ── Main scroll container ── */
      #scroll-area {
        max-width: 720px;
        margin: 0 auto;
        padding: 6rem 2rem 14rem;
      }

      /* ── Content blocks ── */
      .block {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.75s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
        margin-bottom: 4rem;
      }

      .block.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .block.image-block {
        text-align: center;
      }

      .block.image-block img {
        max-width: 100%;
        max-height: 70vh;
        object-fit: contain;
        display: block;
        margin: 0 auto;
        border-radius: 2px;
      }

      .block.image-block.rotated-block {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 6rem;
      }

      .block.image-block img.rotated {
        transform: rotate(90deg);
        max-width: 70vh;
        max-height: 55vw;
      }

      .block.text-block p {
        font-size: clamp(1.15rem, 2.5vw, 1.35rem);
        line-height: 1.9;
        color: var(--ink);
      }

      /* Salutation */
      .salutation {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.2rem, 3vw, 1.5rem);
        font-style: italic;
        color: var(--ink-light);
        margin-bottom: 1.2rem;
        display: block;
      }

      /* Sign-off */
      .sign-off {
        margin-top: 2.5rem;
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 1.6rem;
        color: var(--ink-light);
        display: block;
      }

      /* Fin marker */
      #fin {
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 1.1rem;
        color: var(--ink-light);
        opacity: 0;
        transition: opacity 1s ease;
        margin-top: 2rem;
        letter-spacing: 0.1em;
      }

      #fin.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>

    </div>

        { type: "image", src: IMG[4], rotate: false },
        {
          type: "text",
          text: "More music (that's her foot in the bottom right corner).",
        },

        { type: "image", src: IMG[5], rotate: false },
        { type: "text", text: "More food." },

        { type: "image", src: IMG[6], rotate: false },
        {
          type: "text",
          text: "How lucky am I to share so many things I love with somebody as genuine, passionate, and pretty as her?",
        },

        { type: "image", src: IMG[7], rotate: true },
        {
          type: "text",
          text: "This is my girlfriend, and even though she's far away right now, I feel a little bit closer to her when I look at these pictures and relive these moments. If I shuts my eyes hard enough, I can still run my hands through her luscious hair, I can still hold her hand, I can still smell her sweet perfume, and I can still kiss her perfect face.",
        },
        {
          type: "text",
          text: "Long-distance isn't easy. But for her, I'll do it all and more. She is worth every nostalgic heartache, every WhatsApp video call, every airport goodbye.",
        },
        {
          type: "text",
          text: "She doesn't think I cried when I dropped her off in Albany that morning. The truth is that I did. I cried harder in that car ride back to campus than I had in a long time. I don't know if I can truly communicate how much I'll miss her presence these next few weeks.",
        },
        {
          type: "text",
          text: "She makes me happy. She teaches me how to be strong. She helps me find the courage and the discipline to pursue the life I dream of. I hope she knows that she's part of that dream, too. She's the first thing I think about every morning and I'd like to wake up and roll over to her side of the bed again soon.",
        },
        {
          type: "text",
          text: "Thank you for four amazing months Lucia. I've said this before, but I'l say it again: thank you for letting me love you for this long. I'm proud of us. Until I can kiss your big juicy lips again, I guess the WhatsApp calls and funky online letters will have to do, although something tells me that I'll see you sooner than I expect.",
        },
        { type: "signoff", text: "Te amo bella <3" },
      ];

      // ── State ─────────────────────────────────────────────────────────────
      let cursor = -1;
      let started = false;
      const scrollArea = document.getElementById("scroll-area");

      // ── Helpers ───────────────────────────────────────────────────────────
      function createBlock(item) {
        const block = document.createElement("div");
        block.classList.add("block");

        if (item.type === "image") {
          block.classList.add("image-block");
          const img = document.createElement("img");
          img.src = item.src;
          img.alt = "";
          if (item.rotate) {
            img.classList.add("rotated");
            block.classList.add("rotated-block");
          }
          block.appendChild(img);
        } else if (item.type === "salutation") {
          block.classList.add("text-block");
          const span = document.createElement("span");
          span.className = "salutation";
          span.textContent = item.text;
          block.appendChild(span);
        } else if (item.type === "signoff") {
          block.classList.add("text-block");
          const span = document.createElement("span");
          span.className = "sign-off";
          span.textContent = item.text;
          block.appendChild(span);
        } else {
          // plain text paragraph
          block.classList.add("text-block");
          const p = document.createElement("p");
          p.textContent = item.text;
          block.appendChild(p);
        }

        return block;
      }

      function appendBlock(item, delay = 0) {
        const block = createBlock(item);
        scrollArea.appendChild(block);
        setTimeout(() => {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              block.classList.add("visible");
            });
          });
        }, delay);
        return block;
      }

      function smoothScrollToBottom() {
        setTimeout(() => {
          window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth",
          });
        }, 120);
      }

      function showFin() {
        const fin = document.createElement("p");
        fin.id = "fin";
        fin.textContent = "- Mr. Producer-Man";
        scrollArea.appendChild(fin);
        requestAnimationFrame(() =>
          requestAnimationFrame(() => fin.classList.add("visible")),
        );
        smoothScrollToBottom();
      }

      function showNext() {
        cursor++;

        if (cursor >= CONTENT.length) {
          showFin();
          return;
        }

        const item = CONTENT[cursor];

        if (item.type === "image") {
          // Show image, then after a brief pause show the next text item too
          appendBlock(item, 0);
          const next = CONTENT[cursor + 1];
          if (next && next.type !== "image") {
            cursor++;
            appendBlock(next, 500);
            setTimeout(() => smoothScrollToBottom(), 600);
          } else {
            smoothScrollToBottom();
          }
        } else {
          appendBlock(item, 0);
          smoothScrollToBottom();
        }

        // After sign-off appears, show fin automatically
        if (
          item.type === "signoff" ||
          (cursor < CONTENT.length &&
            CONTENT[cursor] &&
            CONTENT[cursor].type === "signoff")
        ) {
          if (item.type === "signoff") {
            setTimeout(() => showFin(), 1200);
            return;
          }
        }
      }

      // ── Global click handler ──────────────────────────────────────────────
      document.addEventListener("click", () => {
        if (!started) {
          started = true;
          document.getElementById("title-screen").classList.add("hidden");
          showNext();
          return;
        }
        // Don't advance past the sign-off
        const finEl = document.getElementById("fin");
        if (!finEl) {
          showNext();
        }
      });
    </script>
  </body>
